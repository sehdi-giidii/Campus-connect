<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login — Campus Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0a0f1e;
      --accent:      #f97316;
      --accent2:     #fbbf24;
      --teal:        #2dd4bf;
      --text:        #f1f5f9;
      --muted:       #94a3b8;
      --card-bg:     rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.09);
      --input-bg:    rgba(255,255,255,0.06);
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── background ── */
    .grid-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); }
    .orb1 { width:380px; height:380px; background:rgba(249,115,22,0.10); top:-80px;   right:-60px; }
    .orb2 { width:280px; height:280px; background:rgba(45,212,191,0.08); bottom:40px; left:-50px;  }

    /* ── nav ── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px;
      border-bottom: 1px solid var(--card-border);
      animation: fadeUp 0.4s ease both;
    }
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 18px; letter-spacing: -0.5px;
      text-decoration: none; color: var(--text);
    }
    .logo span { color: var(--accent); }
    .back-btn {
      font-size: 12px; color: var(--muted); text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border: 1px solid var(--card-border);
      border-radius: 20px; transition: color 0.2s, border-color 0.2s;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── page wrap ── */
    .page-wrap {
      position: relative; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 69px); padding: 40px 24px;
    }

    /* ── auth box ── */
    .auth-box {
      width: 100%; max-width: 420px;
      animation: fadeUp 0.5s 0.15s ease both; opacity: 0;
    }

    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-icon {
      width: 52px; height: 52px; background: rgba(249,115,22,0.15);
      border-radius: 16px; display: flex; align-items: center;
      justify-content: center; font-size: 24px; margin: 0 auto 16px;
    }
    .auth-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 26px; letter-spacing: -1px; margin-bottom: 6px;
    }
    .auth-sub { font-size: 13px; color: var(--muted); }

    /* ── tabs ── */
    .tabs {
      display: flex; background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border); border-radius: 14px;
      padding: 4px; margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 9px; font-size: 13px; font-weight: 500;
      border: none; background: transparent; color: var(--muted);
      cursor: pointer; border-radius: 10px; transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active { background: rgba(249,115,22,0.18); color: #fb923c; }

    /* ── form panels ── */
    .form-panel         { display: none; }
    .form-panel.active  { display: block; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 12px; color: var(--muted);
      margin-bottom: 6px; letter-spacing: 0.03em;
    }
    .field input {
      width: 100%; background: var(--input-bg);
      border: 1px solid var(--card-border); border-radius: 10px;
      padding: 12px 14px; font-size: 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s;
    }
    .field input::placeholder { color: rgba(148,163,184,0.5); }
    .field input:focus { border-color: rgba(249,115,22,0.5); }

    /* ── buttons ── */
    .submit-btn {
      width: 100%; padding: 13px; background: var(--accent);
      color: #fff; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s, transform 0.15s; margin-top: 4px;
    }
    .submit-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--card-border);
    }

    .google-btn {
      width: 100%; padding: 12px; background: var(--input-bg);
      border: 1px solid var(--card-border); border-radius: 12px;
      font-size: 13px; color: var(--text); cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, border-color 0.2s;
    }
    .google-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
    }
    .g-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── success message ── */
    .success-msg {
      display: none;
      background: rgba(45,212,191,0.10);
      border: 1px solid rgba(45,212,191,0.25);
      border-radius: 10px; padding: 12px 16px;
      font-size: 13px; color: var(--teal);
      text-align: center; margin-top: 12px;
    }

    @media (max-width: 600px) {
      nav { padding: 18px 20px; }
      .page-wrap { padding: 30px 16px; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- navbar -->
  <nav>
    <a class="logo" href="../index.html">Campus <span>Connect</span></a>
    <a class="back-btn" href="../index.html">← Back to home</a>
  </nav>

  <div class="page-wrap">
    <div class="auth-box">

      <div class="auth-header">
        <div class="auth-icon">🎓</div>
        <div class="auth-title">Student Portal</div>
        <div class="auth-sub">Login or create your student account</div>
      </div>

      <!-- tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab"        onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- ── LOGIN FORM ── -->
      <div class="form-panel active" id="panel-login">
        <div class="field">
          <label>College Email</label>
          <input type="email" id="login-email" placeholder="yourname@nit.ac.in"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Enter your password"/>
        </div>
        <button class="submit-btn" onclick="handleLogin()">Login →</button>

        <div class="divider">or</div>

        <button class="google-btn" onclick="handleGoogle()">
          <svg class="g-icon" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.5-2.9-11.2-7.1l-6.6 5.1C9.8 40 16.4 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 36.2 44 30.5 44 24c0-1.3-.1-2.7-.4-4z"/>
          </svg>
          Continue with Google
        </button>

        <div class="success-msg" id="login-success">✓ Logged in! Redirecting to dashboard...</div>
      </div>

      <!-- ── SIGNUP FORM ── -->
      <div class="form-panel" id="panel-signup">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your full name"/>
        </div>
        <div class="field">
          <label>College Email</label>
          <input type="email" id="signup-email" placeholder="yourname@nit.ac.in"/>
        </div>
        <div class="field">
          <label>Roll Number</label>
          <input type="text" id="signup-roll" placeholder="e.g. CS25B000"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signup-pass" placeholder="Create a password (min 6 chars)"/>
        </div>
        <button class="submit-btn" onclick="handleSignup()">Create Account →</button>

        <div class="divider">or</div>

        <button class="google-btn" onclick="handleGoogle()">
          <svg class="g-icon" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.4 35.6 26.8 36 24 36c-5.2 0-9.5-2.9-11.2-7.1l-6.6 5.1C9.8 40 16.4 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20H24v8h11.3c-.9 2.5-2.6 4.6-4.8 6l6.2 5.2C40.5 36.2 44 30.5 44 24c0-1.3-.1-2.7-.4-4z"/>
          </svg>
          Continue with Google
        </button>

        <div class="success-msg" id="signup-success">✓ Account created! Redirecting to dashboard...</div>
      </div>

    </div>
  </div>

  <script>
    // ── switch tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
  });
  document.getElementById('panel-login').classList.toggle('active',  tab === 'login');
  document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
}

// ── LOGIN ──
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value.trim();
  if (!email || !pass) { alert('Please fill in all fields.'); return; }

  const res  = await fetch('const res = await fetch('/api/student/login', {/api/student/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, password: pass })
  });
  const data = await res.json();

  if (res.ok) {
    document.getElementById('login-success').style.display = 'block';
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
  } else {
    alert(data.error);
  }
}

// ── SIGNUP ──
async function handleSignup() {
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const roll  = document.getElementById('signup-roll').value.trim();
  const pass  = document.getElementById('signup-pass').value.trim();
  if (!name || !email || !roll || !pass) { alert('Please fill in all fields.'); return; }

  const res  = await fetch('const res = await fetch('/api/student/login', {/api/student/signup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, email: email, roll: roll, password: pass })
  });
  const data = await res.json();

  if (res.ok) {
    document.getElementById('signup-success').style.display = 'block';
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
  } else {
    alert(data.error);
  }
}

function handleGoogle() {
  alert('Google Sign-In coming soon!');
}
  </script>
</body>
</html>
